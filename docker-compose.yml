services:

    db:
        image: mysql:8.0
        container_name: chat_db
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p${MYSQL_ROOT_PASSWORD}"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - chat_net

    server:
        build:
            context: ./server
            dockerfile: server.Dockerfile
        container_name: chat_server
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        environment:
            DB_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(db:3306)/${MYSQL_DATABASE?charset=utf8mb4&parseTime=True&loc=Local
            JWT_SECRET: ${JWT_SECRET}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
            GIN_MODE: release
        volumes:
            - uploads:/app/uploads
        networks:
        - chat_net

    client:
        build:
            context: ./client
            dockerfile: client.Dockerfile
            args:
                VITE_API_URL: ${VITE_API_URL}
        container_name: chat_client
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - "80:80"
        volumes:
            - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - chat_net
    
volumes:
    db_data:
    uploads_data:

networks:
  chat_net:
    driver: bridge